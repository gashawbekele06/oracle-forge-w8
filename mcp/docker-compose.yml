name: oracle-forge-mcp

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oracleforge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oracleforge"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-seed:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ..:/workspace:ro
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        set -eu;
        DUMP_DIR=/workspace/DataAgentBench/query_yelp/query_dataset/yelp_business;
        if [ ! -d "$$DUMP_DIR" ]; then
          echo "Mongo dump folder not found: $$DUMP_DIR";
          exit 1;
        fi;
        echo "Seeding MongoDB from $$DUMP_DIR ...";
        mongorestore --host mongo --port 27017 --drop "$$DUMP_DIR";
        echo "MongoDB seed completed.";
    profiles: ["seed"]

  postgres-seed:
    image: python:3.12-slim
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Must use service hostname `postgres`, not localhost (host POSTGRES_DSN would break in-container).
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/oracleforge
      DUCKDB_PATH: /workspace/DataAgentBench/query_yelp/query_dataset/yelp_user.db
    volumes:
      - ..:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        set -eu;
        pip install --no-cache-dir -q "asyncpg>=0.29.0" "pymongo>=4.6.0" "duckdb>=0.10.0" &&
        python scripts/seed_yelp_postgres.py
    profiles: ["seed"]

  # Add derived columns + business_category without DROP (for existing Docker volumes).
  postgres-migrate:
    image: python:3.12-slim
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/oracleforge
      DUCKDB_PATH: /workspace/DataAgentBench/query_yelp/query_dataset/yelp_user.db
    volumes:
      - ..:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        set -eu;
        pip install --no-cache-dir -q "asyncpg>=0.29.0" "pymongo>=4.6.0" "duckdb>=0.10.0" &&
        python scripts/migrate_yelp_postgres_derived.py
    profiles: ["seed"]

  toolbox:
    build:
      context: ..
      dockerfile: mcp/Dockerfile.toolbox
      args:
        TOOLBOX_VERSION: "0.30.0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://postgres:postgres@postgres:5432/oracleforge}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-yelp_db}
      SQLITE_PATH: ${SQLITE_PATH:-/workspace/DataAgentBench/query_bookreview/query_dataset/review_query.db}
      DUCKDB_PATH: ${DUCKDB_PATH:-/workspace/DataAgentBench/query_yelp/query_dataset/yelp_user.db}
    volumes:
      - ..:/workspace
    command: ["--address", "0.0.0.0", "--port", "5000", "--tools-file", "/workspace/mcp/tools.yaml"]
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/"]
      interval: 5s
      timeout: 5s
      retries: 20
